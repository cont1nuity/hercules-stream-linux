name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libusb-1.0-0
          python -m pip install --upgrade pip
          pip install "pyusb>=1.2" pillow dbus-next
      - name: Offline selftests (CRC gate + op grammar, no hardware)
        # src/sm.py is intentionally omitted: its byte-match acceptance test reads USB
        # captures from the private dev/ repo, absent in the public checkout. The
        # maintainer runs it locally; the five below are self-contained.
        run: |
          python src/vu_crc.py
          python src/element_test.py --selftest
          python src/ui.py --selftest
          python src/stream200.py selftest
          python src/sm200.py
